<!DOCTYPE html>
<html>
<head>
  <title>McPath - Silverstone Mini</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    #ui { position: absolute; top: 10; left: 10; color: white; font-family: sans-serif; pointer-events: none; }
  </style>
</head>
<body>
<div id="ui">Use Arrows to Drive | Silverstone GP Layout</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>
<script>

// ================= SCENE SETUP =================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 3000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(100, 200, 50);
scene.add(dirLight);

// ================= TRACK GEOMETRY =================
const scale = 8;
// Simplified Silverstone GP Coordinates
const rawPoints = [
  [0, 0],       // Hamilton Straight
  [40, 0],      // Abbey & Farm
  [60, 20],     // Village
  [40, 40],     // The Loop
  [10, 35],     // Aintree
  [-40, 35],    // Wellington Straight
  [-70, 60],    // Brooklands
  [-85, 40],    // Luffield
  [-80, 10],    // Woodcote
  [-40, 0],     // Copse
  [-10, 40],    // Maggots
  [20, 70],     // Becketts
  [40, 90],     // Chapel
  [100, 110],   // Hangar Straight
  [150, 80],    // Stowe
  [140, 20],    // Vale
  [110, 0],     // Club
  [0, 0]        // Back to Finish
];

const points = rawPoints.map(p => new THREE.Vector3(p[0] * scale, 0, p[1] * scale));
const curve = new THREE.CatmullRomCurve3(points, true);

function createTrackMesh(width, color, offsetHeight) {
  const segments = 600;
  const positions = [];
  const colors = [];
  const indices = [];

  for (let i = 0; i <= segments; i++) {
    const t = i / segments;
    const p = curve.getPointAt(t);
    const tan = curve.getTangentAt(t);
    const norm = new THREE.Vector3(-tan.z, 0, tan.x).normalize();

    const left = p.clone().add(norm.clone().multiplyScalar(width / 2));
    const right = p.clone().add(norm.clone().multiplyScalar(-width / 2));

    positions.push(left.x, offsetHeight, left.z, right.x, offsetHeight, right.z);

    // Checkerboard color for curbs if this is the curb mesh
    if (width > 15) { 
      const c = Math.floor(t * 100) % 2 === 0 ? new THREE.Color(0xffffff) : new THREE.Color(0xff0000);
      colors.push(c.r, c.g, c.b, c.r, c.g, c.b);
    }
  }

  for (let i = 0; i < segments; i++) {
    const base = i * 2;
    indices.push(base, base + 1, base + 2, base + 1, base + 3, base + 2);
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  if (colors.length) geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
  geo.setIndex(indices);
  
  return new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ 
    color: colors.length ? 0xffffff : color, 
    vertexColors: colors.length > 0,
    side: THREE.DoubleSide 
  }));
}

// Ground
const ground = new THREE.Mesh(new THREE.PlaneGeometry(4000, 4000), new THREE.MeshStandardMaterial({ color: 0x228B22 }));
ground.rotation.x = -Math.PI / 2;
scene.add(ground);

// Main Road and Curbs
const road = createTrackMesh(14, 0x333333, 0.1);
const curbs = createTrackMesh(16, 0xffffff, 0.05);
scene.add(road, curbs);

// ================= CAR SETUP =================
const carGroup = new THREE.Group();
const body = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.6, 2.5), new THREE.MeshStandardMaterial({ color: 0xff0000 }));
body.position.y = 0.5;
carGroup.add(body);

// Wheels
const wheelGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.4, 12);
const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
const wheelPositions = [[0.7,0.3,0.8], [-0.7,0.3,0.8], [0.7,0.3,-0.8], [-0.7,0.3,-0.8]];
wheelPositions.forEach(pos => {
  const w = new THREE.Mesh(wheelGeo, wheelMat);
  w.rotation.z = Math.PI/2;
  w.position.set(...pos);
  carGroup.add(w);
});

scene.add(carGroup);

// ================= PHYSICS & INPUT =================
let keys = {};
let velocity = 0;
let rotationSpeed = 0;
const friction = 0.98;
const acceleration = 0.03;

document.addEventListener("keydown", (e) => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", (e) => keys[e.key.toLowerCase()] = false);

function animate() {
  requestAnimationFrame(animate);

  // Driving Physics
  if (keys["arrowup"]) velocity += acceleration;
  if (keys["arrowdown"]) velocity -= acceleration;
  
  velocity *= friction;
  
  if (Math.abs(velocity) > 0.01) {
    if (keys["arrowleft"]) rotationSpeed += 0.005;
    if (keys["arrowright"]) rotationSpeed -= 0.005;
  }
  
  rotationSpeed *= 0.9;
  carGroup.rotation.y += rotationSpeed * (velocity * 0.5);

  carGroup.position.x -= Math.sin(carGroup.rotation.y) * velocity;
  carGroup.position.z -= Math.cos(carGroup.rotation.y) * velocity;

  // Camera Follow
  const relativeCameraOffset = new THREE.Vector3(0, 7, 15);
  const cameraOffset = relativeCameraOffset.applyMatrix4(carGroup.matrixWorld);
  camera.position.lerp(cameraOffset, 0.1);
  camera.lookAt(carGroup.position);

  renderer.render(scene, camera);
}

animate();

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>
</body>
</html>
