<!DOCTYPE html>
<html>
<head>
  <title>McPath</title>
  <style>
    body { margin: 0; }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>
  <script>
// ================= SCENE =================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

// Camera
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 2000);
camera.position.set(0, 5, 10);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Lighting
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1));

// Ground
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(2000, 2000),
  new THREE.MeshStandardMaterial({ color: 0x228B22 })
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// ================= TRACK =================
const scale = 5;
const rawPoints = [
  [0,0],[20,10],[40,30],[80,60],[60,120],[20,160],
  [-20,150],[-50,140],[-90,130],[-140,120],
  [-150,60],[-130,20],[-100,30],[-60,80],
  [-20,110],[0,80],[5,40],[0,0]
];

const trackPoints = rawPoints.map(p => 
  new THREE.Vector3(p[0]*scale, 0, p[1]*scale)
);

const curve = new THREE.CatmullRomCurve3(trackPoints, true);

const roadGeo = new THREE.TubeGeometry(curve, 400, 5, 12, true);
const roadMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
const road = new THREE.Mesh(roadGeo, roadMat);
scene.add(road);

// ================= CAR =================
const car = new THREE.Mesh(
  new THREE.BoxGeometry(1, 1, 2),
  new THREE.MeshStandardMaterial({ color: 0xff0000 })
);
car.position.set(0, 1, 0);
scene.add(car);

// ================= FREE CAMERA CONTROLS =================
let freeLookEnabled = false; // toggle with T
let yaw = 0;
let pitch = 0;

let keys = {};
let flyUp = false;
let flyDown = false;

// Keyboard
document.addEventListener("keydown", (e) => {
  keys[e.key.toLowerCase()] = true;

  // Toggle free-look
  if (e.key.toLowerCase() === "t") freeLookEnabled = !freeLookEnabled;
});

document.addEventListener("keyup", (e) => keys[e.key.toLowerCase()] = false);

// Mouse look
document.addEventListener("mousemove", (e) => {
  if (freeLookEnabled && document.pointerLockElement === document.body) {
    yaw -= e.movementX * 0.002;
    pitch -= e.movementY * 0.002;
    pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
  }
});

// Mouse buttons
document.addEventListener("mousedown", (e) => {
  if (!freeLookEnabled) return;
  if (e.button === 0) flyUp = true;
  if (e.button === 2) flyDown = true;
});

document.addEventListener("mouseup", (e) => {
  if (!freeLookEnabled) return;
  if (e.button === 0) flyUp = false;
  if (e.button === 2) flyDown = false;
});

// Disable right-click menu
document.addEventListener("contextmenu", e => e.preventDefault());

// ================= LOOP =================
function animate() {
  requestAnimationFrame(animate);

  // Driving car controls
  let moveSpeed = 0.5;
  let turnSpeed = 0.04;
  if (!freeLookEnabled) {
    // arrow keys control car
    if (keys["arrowup"]) car.position.x -= Math.sin(car.rotation.y)*moveSpeed;
    if (keys["arrowup"]) car.position.z -= Math.cos(car.rotation.y)*moveSpeed;
    if (keys["arrowdown"]) car.position.x += Math.sin(car.rotation.y)*moveSpeed;
    if (keys["arrowdown"]) car.position.z += Math.cos(car.rotation.y)*moveSpeed;
    if (keys["arrowleft"]) car.rotation.y += turnSpeed;
    if (keys["arrowright"]) car.rotation.y -= turnSpeed;
  }

  // Free-look camera
  if (freeLookEnabled) {
    camera.rotation.order = "YXZ";
    camera.rotation.y = yaw;
    camera.rotation.x = pitch;

    // Direction vectors
    const forward = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
    const right = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));

    const speed = 0.5;
    const verticalSpeed = 0.4;

    if (keys["w"]) camera.position.add(forward.clone().multiplyScalar(speed));
    if (keys["s"]) camera.position.add(forward.clone().multiplyScalar(-speed));
    if (keys["a"]) camera.position.add(right.clone().multiplyScalar(-speed));
    if (keys["d"]) camera.position.add(right.clone().multiplyScalar(speed));

    if (flyUp) camera.position.y += verticalSpeed;
    if (flyDown) camera.position.y -= verticalSpeed;
  } else {
    // Camera follows car
    const camDistance = 10;
    const camHeight = 5;

    const targetX = car.position.x + Math.sin(car.rotation.y) * camDistance;
    const targetZ = car.position.z + Math.cos(car.rotation.y) * camDistance;

    camera.position.x += (targetX - camera.position.x) * 0.1;
    camera.position.y += (car.position.y + camHeight - camera.position.y) * 0.1;
    camera.position.z += (targetZ - camera.position.z) * 0.1;

    camera.lookAt(car.position);
  }

  renderer.render(scene, camera);
}

animate();

// Pointer lock to enable mouse-look
document.body.addEventListener("click", () => {
  if (freeLookEnabled) document.body.requestPointerLock();
});

// Resize
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
  </script>
</body>
</html>
