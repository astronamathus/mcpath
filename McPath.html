<body>
<div id="ui">

<script>

// ================= SCENE SETUP =================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 5000);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);

scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(500, 1000, 500);
scene.add(dirLight);

// ================= GEOGRAPHIC PROJECTION =================
function project(lon, lat, centerLon, centerLat) {
    const radius = 6378137;
    const x = radius * (lon - centerLon) * (Math.PI / 180) * Math.cos(centerLat * Math.PI / 180);
    const z = radius * (lat - centerLat) * (Math.PI / 180);
    return { x, z };
}

9811,0 -1.018596070879,52.0637207907761,0 -1.01868004964676,52.06376119782561,0 -1.018743992435593,52.06381089849128,0 -1.018811452298819,52.06385652688768,0 -1.018858967904649,52.06390350390652,0 -1.018993035687085,52.06406217458404,0 -1.019107782488455,52.06422117262804,0 -1.019235357656725,52.0643839034753,0 -1.019366314683108,52.06454019376744,0 -1.01952930300157,52.06469624526397,0 -1.019696370164483,52.06485016673575,0 -1.020008179970868,52.06511776347905,0 -1.020196138287969,52.06526694858952,0 -1.022028916512165,52.06652552723003,0 -1.022045582679302,52.06653560195564,0 -1.022060074115243,52.06654444183261,0 -1.022079270441002,52.06655249709476,0 -1.022097509641322,52.06655755601457,0 -1.022114712467036,52.06656115515087,0 -1.022130919322024,52.06656375413018,0 -1.022148050468565,52.06656559607554,0 -1.022167044525203,52.0665665616045,0 -1.022205083270686,52.06656672381747,0 -1.022244704970487,52.06656314579924,0 -1.022285587909022,52.06655659729491,0 -1.022316440497446,52.06654761226398,0 -1.022343026341772,52.06653633540961,0 -1.022394565717459,52.06651244637424,0 -1.022615580053112,52.06638026526601,0 -1.022726691883818,52.06632178510995,0 -1.022857839676085,52.06627529665404,0 -1.022913826324862,52.06625239245865,0 -1.022988060904715,52.06624504335417,0 -1.023056495735027,52.066236205632,0 -1.023130068607652,52.06623931138905,0 -1.023234828044627,52.06625897008701,0 -1.023327435870145,52.06629640685486,0 -1.02349570119374,52.06638863059514,0 -1.02377442548033,52.06658786030396,0 -1.024019008492784,52.066825386319,0 -1.02420909829768,52.06706115129428,0 -1.024285502572707,52.06719644085609,0 -1.024322575377683,52.06732742795145,0 -1.024341919601366,52.06740428808654,0 -1.024343478806711,52.06745985213485,0 -1.02434727443784,52.067543525226,0 -1.024293663750491,52.06759671613199,0 -1.0227119192528,52.06892903235691,0";

const coords = kmlCoords.trim().split(/\s+/).map(p => {
    const [lon, lat] = p.split(',').map(Number);
    return { lon, lat };
});

const centerLon = coords.reduce((a, b) => a + b.lon, 0) / coords.length;
const centerLat = coords.reduce((a, b) => a + b.lat, 0) / coords.length;

const points = coords.map(p => {
    const proj = project(p.lon, p.lat, centerLon, centerLat);
    return new THREE.Vector3(proj.x, 0, proj.z);
});

const curve = new THREE.CatmullRomCurve3(points, true);
curve.curveType = 'centripetal'; 

// ================= GROUND =================
const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(10000, 10000),
    new THREE.MeshStandardMaterial({ color: 0x228B22 })
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// ================= ROAD GEOMETRY (Frenet Fix) =================
const roadWidth = 14;
const segments = 1200; 
const frames = curve.computeFrenetFrames(segments, true);

const roadPositions = [];
const roadIndices = [];

for (let i = 0; i < segments; i++) {
    const p1 = curve.getPointAt(i / segments);
    const p2 = curve.getPointAt(((i + 1) % (segments + 1)) / segments);

    const n1 = frames.binormals[i];
    const n2 = frames.binormals[(i + 1) % segments];

    const l1 = p1.clone().add(n1.clone().multiplyScalar(roadWidth / 2));
    const r1 = p1.clone().add(n1.clone().multiplyScalar(-roadWidth / 2));
    const l2 = p2.clone().add(n2.clone().multiplyScalar(roadWidth / 2));
    const r2 = p2.clone().add(n2.clone().multiplyScalar(-roadWidth / 2));

    l1.y = r1.y = l2.y = r2.y = 0.1;

    const base = roadPositions.length / 3;
    roadPositions.push(l1.x, l1.y, l1.z, r1.x, r1.y, r1.z, l2.x, l2.y, l2.z, r2.x, r2.y, r2.z);
    roadIndices.push(base, base+1, base+2, base+1, base+3, base+2);
}

const roadGeo = new THREE.BufferGeometry();
roadGeo.setAttribute('position', new THREE.Float32BufferAttribute(roadPositions, 3));
roadGeo.setIndex(roadIndices);
roadGeo.computeVertexNormals();

const road = new THREE.Mesh(roadGeo, new THREE.MeshStandardMaterial({ color: 0x333333, side: THREE.DoubleSide }));
scene.add(road);

// ================= CAR =================
const car = new THREE.Mesh(
    new THREE.BoxGeometry(2, 1, 4),
    new THREE.MeshStandardMaterial({ color:0xff0000 })
);
const startPos = curve.getPointAt(0);
car.position.set(startPos.x, 0.6, startPos.z);
scene.add(car);

// ================= INPUT & CAMERA STATE =================
let freeCam = false;
let yaw = 0;
let pitch = 0;
const speed = 1.2;
const verticalSpeed = 1.0;

let keys = {};
let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
let flyUp = false, flyDown = false;

// Physics for car
let velocity = 0;
const maxSpeed = 4.0;
const acceleration = 0.1;
const friction = 0.96;
const baseTurn = 0.045;

// ================= EVENT LISTENERS =================

document.addEventListener("keydown", (e) => {
    const k = e.key.toLowerCase();
    keys[k] = true;

    if (k === "t") {
        freeCam = !freeCam;
        if (freeCam) {
            // Initialize free cam orientation
            yaw = car.rotation.y + Math.PI;
            pitch = -0.2;
        }
    }

    if (k === "w" || e.key === "ArrowUp") moveForward = true;
    if (k === "s" || e.key === "ArrowDown") moveBackward = true;
    if (k === "a" || e.key === "ArrowLeft") moveLeft = true;
    if (k === "d" || e.key === "ArrowRight") moveRight = true;
});

document.addEventListener("keyup", (e) => {
    const k = e.key.toLowerCase();
    keys[k] = false;

    if (k === "w" || e.key === "ArrowUp") moveForward = false;
    if (k === "s" || e.key === "ArrowDown") moveBackward = false;
    if (k === "a" || e.key === "ArrowLeft") moveLeft = false;
    if (k === "d" || e.key === "ArrowRight") moveRight = false;
});

document.body.addEventListener("click", () => {
    if (freeCam) document.body.requestPointerLock();
});

document.addEventListener("mousemove", (e) => {
    if (freeCam && document.pointerLockElement === document.body) {
        yaw -= e.movementX * 0.002;
        pitch -= e.movementY * 0.002;
        pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
    }
});

document.addEventListener("mousedown", (e) => {
    if (freeCam) {
        if (e.button === 0) flyUp = true;
        if (e.button === 2) flyDown = true;
    }
});

document.addEventListener("mouseup", (e) => {
    if (freeCam) {
        if (e.button === 0) flyUp = false;
        if (e.button === 2) flyDown = false;
    }
});

document.addEventListener("contextmenu", e => e.preventDefault());

// ================= ANIMATION LOOP =================

function animate() {
    requestAnimationFrame(animate);

    if (freeCam) {
        // FREE CAMERA LOGIC
        const dir = new THREE.Vector3(0, 0, -1).applyEuler(new THREE.Euler(pitch, yaw, 0));
        const side = new THREE.Vector3(1, 0, 0).applyEuler(new THREE.Euler(0, yaw, 0));

        if (moveForward) camera.position.addScaledVector(dir, speed);
        if (moveBackward) camera.position.addScaledVector(dir, -speed);
        if (moveLeft) camera.position.addScaledVector(side, -speed);
        if (moveRight) camera.position.addScaledVector(side, speed);
        if (flyUp) camera.position.y += verticalSpeed;
        if (flyDown) camera.position.y -= verticalSpeed;

        camera.rotation.set(pitch, yaw, 0, 'YXZ');
    } else {
        // CAR RACING LOGIC
        if (keys["arrowup"] || keys["w"]) velocity += acceleration;
        if (keys["arrowdown"] || keys["s"]) velocity -= acceleration;

        velocity = Math.min(maxSpeed, Math.max(-1.5, velocity));
        velocity *= friction;

        if (velocity !== 0) {
            if (keys["arrowleft"] || keys["a"]) car.rotation.y += baseTurn;
            if (keys["arrowright"] || keys["d"]) car.rotation.y -= baseTurn;
        }

        car.position.x -= Math.sin(car.rotation.y) * velocity;
        car.position.z -= Math.cos(car.rotation.y) * velocity;

        // Smooth Camera Follow
        const camDist = 15;
        const camHeight = 6;
        const targetCamPos = new THREE.Vector3(
            car.position.x + Math.sin(car.rotation.y) * camDist,
            car.position.y + camHeight,
            car.position.z + Math.cos(car.rotation.y) * camDist
        );
        camera.position.lerp(targetCamPos, 0.1);
        camera.lookAt(car.position);
    }

    renderer.render(scene, camera);
}

animate();

window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>
