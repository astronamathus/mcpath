<!DOCTYPE html>
<html>
<head>
  <title>McPath</title>
  <style>
    body { margin: 0; }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>
  <script>
// ================= SCENE =================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

// Camera
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 2000);
camera.position.set(0, 5, 10);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Lighting
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1));

// Ground
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(2000, 2000),
  new THREE.MeshStandardMaterial({ color: 0x228B22 })
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// ================= TRACK =================

const scale = 5;
const rawPoints = [
  [0,0],[20,10],[40,30],[80,60],[60,120],[20,160],
  [-20,150],[-50,140],[-90,130],[-140,120],
  [-150,60],[-130,20],[-100,30],[-60,80],
  [-20,110],[0,80],[5,40],[0,0]
];

const trackPoints = rawPoints.map(p => 
  new THREE.Vector3(p[0]*scale, 0, p[1]*scale)
);

const curve = new THREE.CatmullRomCurve3(trackPoints, true);

const roadGeo = new THREE.TubeGeometry(curve, 400, 5, 12, true);
const roadMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
const road = new THREE.Mesh(roadGeo, roadMat);
scene.add(road);

// ================= FREE CAMERA CONTROLS =================

let yaw = 0;
let pitch = 0;

let moveForward = false;
let moveBackward = false;
let moveLeft = false;
let moveRight = false;

let flyUp = false;
let flyDown = false;

const speed = 0.5;
const verticalSpeed = 0.4;

// Lock pointer on click
document.body.addEventListener("click", () => {
  document.body.requestPointerLock();
});

// Mouse look
document.addEventListener("mousemove", (e) => {
  if (document.pointerLockElement === document.body) {
    yaw -= e.movementX * 0.002;
    pitch -= e.movementY * 0.002;

    pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
  }
});

// Mouse buttons
document.addEventListener("mousedown", (e) => {
  if (e.button === 0) flyUp = true;     // left click
  if (e.button === 2) flyDown = true;   // right click
});

document.addEventListener("mouseup", (e) => {
  if (e.button === 0) flyUp = false;
  if (e.button === 2) flyDown = false;
});

// Disable right-click menu
document.addEventListener("contextmenu", e => e.preventDefault());

// Keyboard movement
document.addEventListener("keydown", (e) => {
  if (e.key === "w" || e.key === "ArrowUp") moveForward = true;
  if (e.key === "s" || e.key === "ArrowDown") moveBackward = true;
  if (e.key === "a" || e.key === "ArrowLeft") moveLeft = true;
  if (e.key === "d" || e.key === "ArrowRight") moveRight = true;
});

document.addEventListener("keyup", (e) => {
  if (e.key === "w" || e.key === "ArrowUp") moveForward = false;
  if (e.key === "s" || e.key === "ArrowDown") moveBackward = false;
  if (e.key === "a" || e.key === "ArrowLeft") moveLeft = false;
  if (e.key === "d" || e.key === "ArrowRight") moveRight = false;
});

// ================= LOOP =================

function animate() {
  requestAnimationFrame(animate);

  // Apply rotation
  camera.rotation.order = "YXZ";
  camera.rotation.y = yaw;
  camera.rotation.x = pitch;

  // Direction vectors
  const forward = new THREE.Vector3(
    -Math.sin(yaw),
    0,
    -Math.cos(yaw)
  );

  const right = new THREE.Vector3(
    Math.cos(yaw),
    0,
    -Math.sin(yaw)
  );

  // Movement
  if (moveForward) camera.position.add(forward.clone().multiplyScalar(speed));
  if (moveBackward) camera.position.add(forward.clone().multiplyScalar(-speed));
  if (moveLeft) camera.position.add(right.clone().multiplyScalar(-speed));
  if (moveRight) camera.position.add(right.clone().multiplyScalar(speed));

  // Vertical
  if (flyUp) camera.position.y += verticalSpeed;
  if (flyDown) camera.position.y -= verticalSpeed;

  renderer.render(scene, camera);
}

animate();

// Resize fix
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

  </script>
</body>
</html>
