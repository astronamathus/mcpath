<!DOCTYPE html>
<html>
<head>
  <title>McPath</title>
  <style>
    body { margin: 0; overflow: hidden; }
  </style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>
<script>

// ================= SCENE =================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 2000);
camera.position.set(0, 5, 10);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
dirLight.position.set(50, 100, -50);
scene.add(dirLight);

// ================= GROUND =================
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(2000, 2000),
  new THREE.MeshStandardMaterial({ color: 0x228B22 })
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// ================= TRACK =================
const scale = 5;
const rawPoints = [
  [0,0],[20,10],[40,30],[80,60],[60,120],[20,160],
  [-20,150],[-50,140],[-90,130],[-140,120],
  [-150,60],[-130,20],[-100,30],[-60,80],
  [-20,110],[0,80],[5,40],[0,0]
];

const points = rawPoints.map(p => new THREE.Vector3(p[0]*scale, 0, p[1]*scale));
const curve = new THREE.CatmullRomCurve3(points, true);

// ================= ROAD =================
const roadWidth = 14;
const segments = 400;

const positions = [];
const indices = [];

for (let i = 0; i < segments; i++) {
  const t1 = i / segments;
  const t2 = (i + 1) / segments;

  const p1 = curve.getPointAt(t1);
  const p2 = curve.getPointAt(t2);

  const tan1 = curve.getTangentAt(t1);
  const tan2 = curve.getTangentAt(t2);

  const n1 = new THREE.Vector3(-tan1.z, 0, tan1.x).normalize();
  const n2 = new THREE.Vector3(-tan2.z, 0, tan2.x).normalize();

  const l1 = p1.clone().add(n1.clone().multiplyScalar(roadWidth / 2));
  const r1 = p1.clone().add(n1.clone().multiplyScalar(-roadWidth / 2));

  const l2 = p2.clone().add(n2.clone().multiplyScalar(roadWidth / 2));
  const r2 = p2.clone().add(n2.clone().multiplyScalar(-roadWidth / 2));

  l1.y = r1.y = l2.y = r2.y = 0.05;

  const base = positions.length / 3;

  positions.push(
    l1.x, l1.y, l1.z,
    r1.x, r1.y, r1.z,
    l2.x, l2.y, l2.z,
    r2.x, r2.y, r2.z
  );

  indices.push(
    base, base+1, base+2,
    base+1, base+3, base+2
  );
}

const geometry = new THREE.BufferGeometry();
geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
geometry.setIndex(indices);
geometry.computeVertexNormals();
geometry.computeBoundingSphere();

const road = new THREE.Mesh(
  geometry,
  new THREE.MeshStandardMaterial({
    color: 0x333333,
    side: THREE.DoubleSide
  })
);

scene.add(road);

// ================= CAR =================
const car = new THREE.Mesh(
  new THREE.BoxGeometry(1, 1, 2),
  new THREE.MeshStandardMaterial({ color:0xff0000 })
);

car.position.set(0, 0.3, 0);
scene.add(car);

// ================= CONTROLS =================
let keys = {};
document.addEventListener("keydown",(e)=>keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup",(e)=>keys[e.key.toLowerCase()] = false);

// ================= PHYSICS =================
let velocity = 0;
const maxSpeed = 2.5;
const reverseSpeed = -1.5;
const acceleration = 0.05;
const friction = 0.98;
const turn = 0.04;

// ================= ANIMATION =================
function animate(){
  requestAnimationFrame(animate);

  // ACCELERATION
  if(keys["arrowup"]) velocity += acceleration;
  if(keys["arrowdown"]) velocity -= acceleration;

  // CLAMP SPEED
  velocity = Math.min(maxSpeed, Math.max(reverseSpeed, velocity));

  // FRICTION
  velocity *= friction;

  // STOP SMALL DRIFT
  if(Math.abs(velocity) < 0.001) velocity = 0;

  // TURNING (depends on speed)
  if(velocity !== 0){
    if(keys["arrowleft"]) car.rotation.y += turn * (velocity * 0.5);
    if(keys["arrowright"]) car.rotation.y -= turn * (velocity * 0.5);
  }

  // MOVE
  car.position.x -= Math.sin(car.rotation.y) * velocity;
  car.position.z -= Math.cos(car.rotation.y) * velocity;
  car.position.y = 0.3;

  // CAMERA FOLLOW
  const dist = 12;
  const height = 6;

  const tx = car.position.x + Math.sin(car.rotation.y)*dist;
  const tz = car.position.z + Math.cos(car.rotation.y)*dist;

  camera.position.x += (tx - camera.position.x)*0.1;
  camera.position.y += (car.position.y + height - camera.position.y)*0.1;
  camera.position.z += (tz - camera.position.z)*0.1;

  camera.lookAt(car.position);

  renderer.render(scene, camera);
}

animate();

// ================= RESIZE =================
window.addEventListener("resize",()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>
</body>
</html>
