<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Silverstone — F1 Circuit Simulator</title>
<style>
  /* =============================================
     GLOBAL STYLES — slowroads.io-inspired minimal HUD
  ============================================= */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0f1a;
    overflow: hidden;
    font-family: 'Courier New', monospace;
  }

  canvas { display: block; }

  /* ---- HUD OVERLAY ---- */
  #hud {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: flex-end;
    gap: 32px;
    pointer-events: none;
    z-index: 100;
  }

  .hud-panel {
    background: rgba(10, 12, 20, 0.55);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 12px 22px;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.08em;
  }

  #speedo-panel {
    text-align: center;
  }

  #speed-value {
    font-size: 3rem;
    font-weight: 700;
    color: #e8f0fe;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }

  #speed-unit {
    font-size: 0.65rem;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.2em;
    margin-top: 2px;
  }

  #gear-panel {
    text-align: center;
    min-width: 54px;
  }

  #gear-label {
    font-size: 0.55rem;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.18em;
    margin-bottom: 4px;
  }

  #gear-value {
    font-size: 2.2rem;
    font-weight: 700;
    color: #a8d8a8;
    line-height: 1;
  }

  #lap-panel {
    text-align: center;
    min-width: 80px;
  }

  #lap-label {
    font-size: 0.55rem;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.18em;
    margin-bottom: 4px;
  }

  #lap-value {
    font-size: 1.4rem;
    font-weight: 600;
    color: #f5c842;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }

  /* ---- THROTTLE / BRAKE BARS ---- */
  #pedal-panel {
    display: flex;
    flex-direction: column;
    gap: 6px;
    justify-content: flex-end;
    padding-bottom: 4px;
  }

  .pedal-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .pedal-label {
    font-size: 0.5rem;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.18em;
    width: 14px;
    text-align: right;
  }

  .pedal-bar-bg {
    width: 70px;
    height: 5px;
    background: rgba(255,255,255,0.08);
    border-radius: 3px;
    overflow: hidden;
  }

  .pedal-bar-fill {
    height: 100%;
    width: 0%;
    border-radius: 3px;
    transition: width 0.04s linear;
  }

  #throttle-fill { background: #7be07b; }
  #brake-fill    { background: #e07b7b; }

  /* ---- MINIMAP ---- */
  #minimap-wrap {
    position: fixed;
    top: 20px;
    right: 22px;
    z-index: 100;
    pointer-events: none;
  }

  #minimap {
    width: 160px;
    height: 160px;
    border-radius: 10px;
    background: rgba(10,12,20,0.55);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.08);
    overflow: hidden;
  }

  /* ---- TOP INFO BAR ---- */
  #top-bar {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    pointer-events: none;
    z-index: 100;
    text-align: center;
    color: rgba(255,255,255,0.3);
    font-size: 0.55rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
  }

  /* ---- CONTROLS HINT ---- */
  #controls-hint {
    position: fixed;
    bottom: 18px;
    right: 22px;
    pointer-events: none;
    z-index: 100;
    color: rgba(255,255,255,0.22);
    font-size: 0.5rem;
    letter-spacing: 0.12em;
    line-height: 1.8;
    text-align: right;
  }

  /* ---- CAMERA MODE INDICATOR ---- */
  #cam-indicator {
    position: fixed;
    top: 16px;
    left: 22px;
    pointer-events: none;
    z-index: 100;
    color: rgba(255,255,255,0.28);
    font-size: 0.55rem;
    letter-spacing: 0.18em;
  }

  /* ---- LOADING SCREEN ---- */
  #loading {
    position: fixed;
    inset: 0;
    background: #0a0f1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 999;
    transition: opacity 0.8s ease;
  }

  #loading h1 {
    color: rgba(255,255,255,0.9);
    font-size: 1.1rem;
    letter-spacing: 0.4em;
    font-weight: 400;
    margin-bottom: 6px;
  }

  #loading p {
    color: rgba(255,255,255,0.25);
    font-size: 0.55rem;
    letter-spacing: 0.28em;
  }

  .load-bar-bg {
    width: 180px;
    height: 2px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    margin-top: 24px;
    overflow: hidden;
  }

  .load-bar-fill {
    height: 100%;
    width: 0%;
    background: rgba(255,255,255,0.5);
    border-radius: 2px;
    animation: loadanim 1.2s ease forwards;
  }

  @keyframes loadanim {
    to { width: 100%; }
  }
</style>

<div id="loading">

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>
<script>
/*
 * ================================================================
 *  SILVERSTONE F1 SIMULATOR
 *  slowroads.io-inspired aesthetic + real circuit data
 *
 *  Architecture:
 *    TrackSystem        — KML → world coords → procedural road mesh
 *    Environment        — sky gradient, fog, terrain
 *    CarModel           — low-poly F1 car (procedural geometry)
 *    PhysicsController  — F1-spec acceleration / braking / steering
 *    CameraSystem       — chase cam + free cam with pointer lock
 *    HUDSystem          — speed, gear, lap timer, minimap, pedals
 *    GameLoop           — requestAnimationFrame master loop
 *
 *  Track data: Silverstone GP KML centerline (real coordinates)
 *  Scale:      5,891 metres (real circuit length)
 * ================================================================
 */

// ================================================================
//  CONSTANTS
// ================================================================
const TRACK_TARGET_LENGTH_M = 5891;  // Real Silverstone GP length
const TRACK_WIDTH            = 14;   // metres — avg Silverstone width
const TRACK_SEGMENTS         = 4000; // curve subdivision for smooth geo
const CAR_TOP_SPEED_MS       = 90;   // ~324 km/h in sim units (~m/s scaled)
const EARTH_RADIUS           = 6378137;

// ================================================================
//  SCENE BOOTSTRAP
// ================================================================
const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = false; // keep 60fps
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();

// slowroads palette: soft dusty sky, gentle fog
const FOG_COLOR = new THREE.Color(0xb8cfe8);
scene.fog = new THREE.FogExp2(FOG_COLOR, 0.00018);
scene.background = FOG_COLOR;

const mainCamera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.5, 8000);
scene.add(mainCamera);

window.addEventListener('resize', () => {
  mainCamera.aspect = window.innerWidth / window.innerHeight;
  mainCamera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ================================================================
//  LIGHTING — soft, dreamy like slowroads
// ================================================================
function setupLighting() {
  // Ambient — fills shadows gently
  const ambient = new THREE.AmbientLight(0xd4e8f5, 1.8);
  scene.add(ambient);

  // Key sun — warm, low angle
  const sun = new THREE.DirectionalLight(0xfff4e0, 2.2);
  sun.position.set(600, 900, 400);
  scene.add(sun);

  // Bounce fill — cool sky light from below
  const bounce = new THREE.HemisphereLight(0xb8d8f0, 0x3a5a2a, 0.9);
  scene.add(bounce);
}
setupLighting();

// ================================================================
//  ENVIRONMENT — procedural terrain + sky dome
// ================================================================
function buildEnvironment() {
  // Sky dome — soft gradient sphere
  const skyGeo = new THREE.SphereGeometry(4000, 16, 8);
  // Invert so inside is rendered
  skyGeo.scale(-1, 1, 1);

  // Gradient via vertex colors top→bottom
  const skyColors = [];
  const skyPos = skyGeo.attributes.position;
  const skyTop    = new THREE.Color(0x4a80c4);
  const skyMid    = new THREE.Color(0x89b8e0);
  const skyHoriz  = new THREE.Color(0xc8dff0);

  for (let i = 0; i < skyPos.count; i++) {
    const y = skyPos.getY(i);
    const norm = Math.max(0, Math.min(1, (y + 1000) / 4500));
    const col = new THREE.Color();
    if (norm > 0.4) col.lerpColors(skyMid, skyTop, (norm - 0.4) / 0.6);
    else col.lerpColors(skyHoriz, skyMid, norm / 0.4);
    skyColors.push(col.r, col.g, col.b);
  }
  skyGeo.setAttribute('color', new THREE.Float32BufferAttribute(skyColors, 3));
  const skyMat = new THREE.MeshBasicMaterial({ vertexColors: true, side: THREE.BackSide, fog: false });
  scene.add(new THREE.Mesh(skyGeo, skyMat));

  // Ground plane — soft green like slowroads grassland
  // Subdivided so vertex colors give gentle terrain feel
  const groundGeo = new THREE.PlaneGeometry(9000, 9000, 1, 1);
  const groundMat = new THREE.MeshLambertMaterial({ color: 0x5a8a4a });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -0.15;
  scene.add(ground);

  // Decorative far hills (simple low-poly ring of bumps)
  buildHills();
}

function buildHills() {
  const hillGeo = new THREE.BufferGeometry();
  const verts = [];
  const cols  = [];
  const COUNT = 32;
  const RADIUS = 2800;

  for (let i = 0; i < COUNT; i++) {
    const a0 = (i / COUNT) * Math.PI * 2;
    const a1 = ((i + 1) / COUNT) * Math.PI * 2;
    const h  = 80 + Math.sin(i * 2.3) * 60 + Math.sin(i * 5.7) * 30;
    const r0 = RADIUS + Math.sin(i * 1.9) * 200;
    const r1 = RADIUS + Math.sin((i+1) * 1.9) * 200;

    const x0 = Math.cos(a0) * r0, z0 = Math.sin(a0) * r0;
    const x1 = Math.cos(a1) * r1, z1 = Math.sin(a1) * r1;

    // Two triangles per segment (hill face)
    verts.push(x0, 0, z0,  x1, 0, z1,  x0, h, z0);
    verts.push(x1, 0, z1,  x1, h, z1,  x0, h, z0);

    const c = new THREE.Color().setHSL(0.28 + Math.sin(i) * 0.04, 0.45, 0.35 + Math.sin(i*0.7)*0.05);
    for (let v = 0; v < 6; v++) cols.push(c.r, c.g, c.b);
  }

  hillGeo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
  hillGeo.setAttribute('color',    new THREE.Float32BufferAttribute(cols,  3));
  hillGeo.computeVertexNormals();
  const hillMat = new THREE.MeshLambertMaterial({ vertexColors: true });
  scene.add(new THREE.Mesh(hillGeo, hillMat));
}

buildEnvironment();

/*
 * TrackSystem — owns curve, road mesh, and coordinate projection.
 * To add a new circuit: swap KML_RAW, recalculate center, done.
 */
const TrackSystem = (() => {
  // -- Mercator-style flat projection centred on track --
  function project(lon, lat, cLon, cLat) {
    const x = -EARTH_RADIUS * (lon - cLon) * (Math.PI / 180) * Math.cos(cLat * Math.PI / 180);
    const z =  EARTH_RADIUS * (lat - cLat) * (Math.PI / 180);
    return { x, z };
  }

  // Parse KML string into raw projected points
  function parseKML(raw) {
    const tokens = raw.trim().split(/\s+/);
    const latLons = tokens.map(t => {
      const [lon, lat] = t.split(',').map(Number);
      return { lon, lat };
    });

    const cLon = latLons.reduce((s, p) => s + p.lon, 0) / latLons.length;
    const cLat = latLons.reduce((s, p) => s + p.lat, 0) / latLons.length;

    return latLons.map(p => {
      const { x, z } = project(p.lon, p.lat, cLon, cLat);
      return new THREE.Vector3(x, 0, z);
    });
  }

  // Scale raw points so the curve matches real-world track length
  function scaleToRealLength(points) {
    // Build a temporary curve to measure its length
    const tempCurve = new THREE.CatmullRomCurve3(points, true);
    tempCurve.curveType = 'centripetal';
    const rawLength = tempCurve.getLength();
    const scale = TRACK_TARGET_LENGTH_M / rawLength;
    return points.map(p => p.clone().multiplyScalar(scale));
  }

  // Build road BufferGeometry using Frenet frames
  function buildRoadMesh(curve) {
    const frames = curve.computeFrenetFrames(TRACK_SEGMENTS, true);
    const positions = [];
    const indices   = [];
    const uvs       = [];
    const colors    = [];

    // Asphalt colour — dark blue-grey with slight variance
    const asphaltBase = new THREE.Color(0x2a2e35);
    const asphaltVar  = new THREE.Color(0x22262c);

    for (let i = 0; i < TRACK_SEGMENTS; i++) {
      const t   = i / TRACK_SEGMENTS;
      const p   = curve.getPointAt(t);
      const bin = frames.binormals[i];

      // Slightly vary width: narrower at fast corners
      const tangent     = frames.tangents[i];
      const nextTangent = frames.tangents[(i + 1) % TRACK_SEGMENTS];
      const curvature   = tangent.angleTo(nextTangent);
      const width       = TRACK_WIDTH * (1.0 - Math.min(curvature * 12, 0.15));

      const lx = p.x + bin.x * width * 0.5;
      const lz = p.z + bin.z * width * 0.5;
      const rx = p.x - bin.x * width * 0.5;
      const rz = p.z - bin.z * width * 0.5;
      const y  = 0.06; // slight raise above ground

      positions.push(lx, y, lz, rx, y, rz);
      uvs.push(0, t * 60, 1, t * 60);

      // Subtle vertex colour variation (gives tyre marks feel)
      const noise = Math.sin(i * 0.07) * 0.03;
      const col = new THREE.Color().lerpColors(asphaltBase, asphaltVar, 0.5 + noise);
      colors.push(col.r, col.g, col.b, col.r, col.g, col.b);

      if (i < TRACK_SEGMENTS - 1) {
        const b = i * 2;
        indices.push(b, b+1, b+2, b+1, b+3, b+2);
      }
    }
    // Close loop
    const lb = (TRACK_SEGMENTS - 1) * 2;
    indices.push(lb, lb+1, 0, lb+1, 1, 0);

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    geo.setAttribute('uv',       new THREE.Float32BufferAttribute(uvs,       2));
    geo.setAttribute('color',    new THREE.Float32BufferAttribute(colors,    3));
    geo.setIndex(indices);
    geo.computeVertexNormals();

    const mat = new THREE.MeshLambertMaterial({
      vertexColors: true,
      side: THREE.DoubleSide
    });

    return new THREE.Mesh(geo, mat);
  }

  // Build white edge lines (kerb-like)
  function buildEdgeLines(curve) {
    const group = new THREE.Group();
    const frames = curve.computeFrenetFrames(TRACK_SEGMENTS, true);

    ['left', 'right'].forEach(side => {
      const pts = [];
      const mult = side === 'left' ? 1 : -1;

      for (let i = 0; i <= TRACK_SEGMENTS; i++) {
        const t   = (i % TRACK_SEGMENTS) / TRACK_SEGMENTS;
        const p   = curve.getPointAt(t);
        const bin = frames.binormals[i % TRACK_SEGMENTS];
        const hw  = (TRACK_WIDTH * 0.5) + 0.3;
        pts.push(new THREE.Vector3(
          p.x + bin.x * hw * mult,
          0.12,
          p.z + bin.z * hw * mult
        ));
      }

      const lineGeo = new THREE.BufferGeometry().setFromPoints(pts);
      const lineMat = new THREE.LineBasicMaterial({
        color: 0xffffff,
        opacity: 0.35,
        transparent: true
      });
      group.add(new THREE.Line(lineGeo, lineMat));
    });

    return group;
  }

  // Build start/finish line
  function buildStartLine(curve) {
    const p0 = curve.getPointAt(0);
    const frames = curve.computeFrenetFrames(TRACK_SEGMENTS, true);
    const bin = frames.binormals[0];

    const pts = [
      new THREE.Vector3(p0.x + bin.x * TRACK_WIDTH * 0.5, 0.08, p0.z + bin.z * TRACK_WIDTH * 0.5),
      new THREE.Vector3(p0.x - bin.x * TRACK_WIDTH * 0.5, 0.08, p0.z - bin.z * TRACK_WIDTH * 0.5)
    ];
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    const mat = new THREE.LineBasicMaterial({ color: 0xffffff, opacity: 0.9, transparent: true });
    return new THREE.Line(geo, mat);
  }

  // Public API
  function build() {
    const rawPoints   = parseKML(KML_RAW);
    const scaledPoints = scaleToRealLength(rawPoints);

    const curve = new THREE.CatmullRomCurve3(scaledPoints, true);
    curve.curveType = 'centripetal';

    const roadMesh  = buildRoadMesh(curve);
    const edgeLines = buildEdgeLines(curve);
    const startLine = buildStartLine(curve);

    scene.add(roadMesh);
    scene.add(edgeLines);
    scene.add(startLine);

    return { curve };
  }

  return { build };
})();

      // Suspension arm
      const armLen = Math.abs(wp.x) - 0.9;
      const armGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.55, 4);
      const arm = new THREE.Mesh(armGeo, darkMat);
      arm.rotation.z = Math.PI / 2;
      arm.position.set(wp.x * 0.5, wr * 0.7, wp.z);
      group.add(arm);
    });

    return { group, wheelObjects };
  }

  return { build };
})();

// ================================================================
//  PHYSICS CONTROLLER — F1-spec, speed-sensitive, stable
// ================================================================
const PhysicsController = (() => {
  const state = {
    velocity:    0,         // sim units / frame (scaled to real m/s-ish)
    heading:     0,         // radians
    wheelAngle:  0,         // visual wheel steer angle
    throttle:    0,         // 0–1 (for HUD)
    braking:     0,         // 0–1 (for HUD)
    gear:        1,
    lapProgress: 0,         // 0–1 around the circuit
    lapTime:     0,         // seconds
    lapCount:    0,
    onTrack:     true,
  };

  // Gear ratios approximate F1 — used for gear display & audio hint
  const GEAR_SPEED_THRESHOLDS = [0, 8, 20, 35, 53, 70, 85]; // sim units

  function calcGear(v) {
    for (let g = GEAR_SPEED_THRESHOLDS.length - 1; g >= 1; g--) {
      if (v >= GEAR_SPEED_THRESHOLDS[g]) return g;
    }
    return 1;
  }

  function update(keys, dt) {
    // dt clamped to avoid spiral of death
    const dtClamped = Math.min(dt, 0.05);

    const vNorm = state.velocity / CAR_TOP_SPEED_MS;

    // ---- ACCELERATION (non-linear torque curve) ----
    state.throttle = 0;
    if (keys.throttle) {
      state.throttle = 1;
      // High torque at low speed, reduces with drag
      const torqueFactor  = Math.pow(1.0 - vNorm * 0.85, 1.4);
      const dragFactor    = Math.pow(vNorm, 2) * 0.6;
      const accel         = (8.0 * torqueFactor - dragFactor) * dtClamped;
      state.velocity      = Math.min(state.velocity + accel, CAR_TOP_SPEED_MS);
    }

    // ---- BRAKING (F1-spec: much stronger than accel) ----
    state.braking = 0;
    if (keys.brake) {
      state.braking  = 1;
      const bForce   = (state.velocity > 5) ? 28.0 : 10.0;
      state.velocity = Math.max(0, state.velocity - bForce * dtClamped);
    }

    // ---- COAST / ENGINE DRAG ----
    if (!keys.throttle && !keys.brake) {
      // Aerodynamic drag + engine braking
      const drag = (0.18 + vNorm * 0.35) * dtClamped;
      state.velocity = Math.max(0, state.velocity - drag * state.velocity * 0.06);
    }

    // ---- STEERING (speed-sensitive) ----
    // At low speed: very responsive. At high speed: very stable.
    const maxSteer    = 0.048;
    const speedDamp   = Math.max(0.18, 1.0 - vNorm * 0.72);
    const steerRate   = maxSteer * speedDamp;
    const steerReturn = 0.88; // how fast wheel self-centres

    if (keys.left  && state.velocity > 0.2) {
      state.heading  += steerRate;
      state.wheelAngle = Math.min(state.wheelAngle + 0.08, 0.45);
    } else if (keys.right && state.velocity > 0.2) {
      state.heading  -= steerRate;
      state.wheelAngle = Math.max(state.wheelAngle - 0.08, -0.45);
    } else {
      state.wheelAngle *= steerReturn;
    }

    // ---- UPDATE GEAR ----
    state.gear = calcGear(state.velocity);

    return state;
  }

  return { update, state };
})();

// ================================================================
//  CAMERA SYSTEM — smooth chase + free cam with pointer lock
// ================================================================
const CameraSystem = (() => {
  let mode = 'chase'; // 'chase' | 'free'

  // Chase cam state
  const chaseState = {
    pos:    new THREE.Vector3(),
    target: new THREE.Vector3(),
  };

  // Free cam state
  const freeState = {
    pos:   new THREE.Vector3(),
    yaw:   0,
    pitch: 0,
    keys:  {},
  };

  let isPointerLocked = false;

  // Init free cam to match current car position/heading
  function initFreeFromCar(carGroup) {
    freeState.pos.copy(mainCamera.position);
    // Extract yaw from camera's current look direction
    const dir = new THREE.Vector3();
    mainCamera.getWorldDirection(dir);
    freeState.yaw   = Math.atan2(-dir.x, -dir.z);
    freeState.pitch = Math.asin(dir.y);
  }

  function enablePointerLock() {
    renderer.domElement.requestPointerLock();
  }

  document.addEventListener('pointerlockchange', () => {
    isPointerLocked = document.pointerLockElement === renderer.domElement;
  });

  // Mouse look
  document.addEventListener('mousemove', e => {
    if (mode !== 'free' || !isPointerLocked) return;
    const sens = 0.0018;
    freeState.yaw   -= e.movementX * sens;
    freeState.pitch -= e.movementY * sens;
    freeState.pitch  = Math.max(-Math.PI * 0.48, Math.min(Math.PI * 0.48, freeState.pitch));
  });

  // Mouse buttons — move toward/away from look direction
  document.addEventListener('mousedown', e => {
    if (mode !== 'free' || !isPointerLocked) return;
    if (e.button === 0) freeState.keys['fly_forward']  = true;
    if (e.button === 2) freeState.keys['fly_backward'] = true;
    e.preventDefault();
  });
  document.addEventListener('mouseup', e => {
    freeState.keys['fly_forward']  = false;
    freeState.keys['fly_backward'] = false;
  });
  document.addEventListener('contextmenu', e => e.preventDefault());

  // Free cam keyboard
  document.addEventListener('keydown', e => {
    freeState.keys[e.key.toLowerCase()] = true;
    freeState.keys[e.code] = true;
  });
  document.addEventListener('keyup', e => {
    freeState.keys[e.key.toLowerCase()] = false;
    freeState.keys[e.code] = false;
  });

  function updateChase(carGroup, velocity) {
    const vNorm = velocity / CAR_TOP_SPEED_MS;

    // Distance increases with speed — immersive feel
    const dist   = 20 + vNorm * 14;
    const height = 5  + vNorm * 2.5;

    const carPos = carGroup.position;
    const carYaw = carGroup.rotation.y;

    const targetPos = new THREE.Vector3(
      carPos.x + Math.sin(carYaw) * dist,
      carPos.y + height,
      carPos.z + Math.cos(carYaw) * dist
    );

    // Smooth lerp with speed-adjusted responsiveness
    const lerpFactor = 0.08 + vNorm * 0.05;
    mainCamera.position.lerp(targetPos, lerpFactor);

    // Look at a point slightly above car
    const lookTarget = new THREE.Vector3(carPos.x, carPos.y + 0.8, carPos.z);
    chaseState.target.lerp(lookTarget, 0.12);
    mainCamera.lookAt(chaseState.target);
  }

  function updateFree(dt) {
    const speed = freeState.keys['shift'] ? 120 : 30;
    const move  = speed * dt;

    // Build orientation quaternion from yaw/pitch
    const qYaw   = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), freeState.yaw);
    const qPitch = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1,0,0), freeState.pitch);
    const qOrient = qYaw.multiply(qPitch);

    // Forward/right/up vectors
    const forward = new THREE.Vector3(0,0,-1).applyQuaternion(qOrient);
    const right   = new THREE.Vector3(1,0, 0).applyQuaternion(qOrient);
    const up      = new THREE.Vector3(0,1, 0);

    const k = freeState.keys;
    if (k['w'] || k['arrowup']    || k['fly_forward'])  freeState.pos.addScaledVector(forward, move);
    if (k['s'] || k['arrowdown']  || k['fly_backward']) freeState.pos.addScaledVector(forward, -move);
    if (k['a'] || k['arrowleft'])  freeState.pos.addScaledVector(right, -move);
    if (k['d'] || k['arrowright']) freeState.pos.addScaledVector(right,  move);
    if (k['q']) freeState.pos.addScaledVector(up, -move);
    if (k['e']) freeState.pos.addScaledVector(up,  move);

    mainCamera.position.copy(freeState.pos);
    mainCamera.quaternion.copy(qOrient);
  }

  function toggleMode(carGroup) {
    if (mode === 'chase') {
      mode = 'free';
      initFreeFromCar(carGroup);
      enablePointerLock();
      document.getElementById('cam-indicator').textContent = 'CAM: FREE';
      document.getElementById('top-bar').textContent = 'SILVERSTONE GP · FREE CAMERA';
    } else {
      mode = 'chase';
      document.exitPointerLock();
      document.getElementById('cam-indicator').textContent = 'CAM: CHASE';
      document.getElementById('top-bar').textContent = 'SILVERSTONE GP · FOLLOW CAM';
    }
  }

  function update(carGroup, velocity, dt) {
    if (mode === 'chase') updateChase(carGroup, velocity);
    else updateFree(dt);
  }

  return { update, toggleMode, get mode() { return mode; } };
})();

// ================================================================
//  INPUT HANDLER — unified keyboard state
// ================================================================
const InputHandler = (() => {
  const keys = {
    throttle: false,
    brake:    false,
    left:     false,
    right:    false,
  };

  document.addEventListener('keydown', e => {
    const k = e.key.toLowerCase();
    if (k === 'w' || k === 'arrowup')    keys.throttle = true;
    if (k === 's' || k === 'arrowdown')  keys.brake    = true;
    if (k === 'a' || k === 'arrowleft')  keys.left     = true;
    if (k === 'd' || k === 'arrowright') keys.right    = true;
    if (k === 't') CameraSystem.toggleMode(car.group);
    if (k === 'r') resetCar();
  });

  document.addEventListener('keyup', e => {
    const k = e.key.toLowerCase();
    if (k === 'w' || k === 'arrowup')    keys.throttle = false;
    if (k === 's' || k === 'arrowdown')  keys.brake    = false;
    if (k === 'a' || k === 'arrowleft')  keys.left     = false;
    if (k === 'd' || k === 'arrowright') keys.right    = false;
  });

  return { keys };
})();

// ================================================================
//  HUD SYSTEM
// ================================================================
const HUDSystem = (() => {
  const speedEl    = document.getElementById('speed-value');
  const gearEl     = document.getElementById('gear-value');
  const lapEl      = document.getElementById('lap-value');
  const throttleEl = document.getElementById('throttle-fill');
  const brakeEl    = document.getElementById('brake-fill');

  const GEAR_NAMES = ['', '1', '2', '3', '4', '5', '6', '7', '8'];

  function formatLap(seconds) {
    const m = Math.floor(seconds / 60);
    const s = Math.floor(seconds % 60);
    const t = Math.floor((seconds % 1) * 10);
    return `${m}:${String(s).padStart(2,'0')}.${t}`;
  }

  function update(state) {
    const kmh = Math.floor(state.velocity * 3.6);
    speedEl.textContent    = kmh;
    gearEl.textContent     = state.velocity < 0.5 ? 'N' : (GEAR_NAMES[state.gear] || '8');
    lapEl.textContent      = formatLap(state.lapTime);
    throttleEl.style.width = (state.throttle * 100) + '%';
    brakeEl.style.width    = (state.braking  * 100) + '%';
  }

  return { update };
})();

// ================================================================
//  MINIMAP
// ================================================================
const Minimap = (() => {
  const canvas  = document.getElementById('minimap');
  const ctx     = canvas.getContext('2d');
  let trackPts  = [];
  let bbox      = { minX: 0, maxX: 0, minZ: 0, maxZ: 0 };

  function init(curve) {
    const count = 300;
    trackPts = [];
    for (let i = 0; i < count; i++) {
      const p = curve.getPointAt(i / count);
      trackPts.push({ x: p.x, z: p.z });
    }
    bbox.minX = Math.min(...trackPts.map(p => p.x));
    bbox.maxX = Math.max(...trackPts.map(p => p.x));
    bbox.minZ = Math.min(...trackPts.map(p => p.z));
    bbox.maxZ = Math.max(...trackPts.map(p => p.z));
  }

  function toCanvas(wx, wz) {
    const pad = 12;
    const cw = canvas.width  - pad * 2;
    const ch = canvas.height - pad * 2;
    const rx = (wx - bbox.minX) / (bbox.maxX - bbox.minX);
    const rz = (wz - bbox.minZ) / (bbox.maxZ - bbox.minZ);
    return { cx: pad + rx * cw, cy: pad + rz * ch };
  }

  function update(carX, carZ) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Track outline
    ctx.beginPath();
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.lineWidth   = 2.5;
    trackPts.forEach((p, i) => {
      const { cx, cy } = toCanvas(p.x, p.z);
      i === 0 ? ctx.moveTo(cx, cy) : ctx.lineTo(cx, cy);
    });
    ctx.closePath();
    ctx.stroke();

    // Car dot
    const { cx, cy } = toCanvas(carX, carZ);
    ctx.beginPath();
    ctx.arc(cx, cy, 3.5, 0, Math.PI * 2);
    ctx.fillStyle = '#ff3a3a';
    ctx.fill();
  }

  return { init, update };
})();

// ================================================================
//  LAP TIMING — simple progress-based detection
// ================================================================
const LapTimer = (() => {
  let lastT      = 0;
  let lapTime    = 0;
  let lapCount   = 0;
  let lapStarted = false;

  function update(physState, curveT, dt) {
    if (!lapStarted && curveT > 0.05) lapStarted = true;

    if (lapStarted) lapTime += dt;

    // Detect crossing start/finish (t crosses from ~0.97 → 0.03)
    if (lapStarted && lastT > 0.9 && curveT < 0.1) {
      lapCount++;
      lapTime = 0;
    }

    lastT = curveT;
    physState.lapTime  = lapTime;
    physState.lapCount = lapCount;
  }

  return { update };
})();

// ================================================================
//  WHEEL ROTATION ANIMATION
// ================================================================
function animateWheels(wheelObjs, velocity, dt) {
  const rotSpeed = velocity * 0.55; // rotations per frame
  wheelObjs.forEach(w => {
    w.rotation.x += rotSpeed * dt;
  });
}

// ================================================================
//  ASSEMBLE SCENE
// ================================================================
let track, car;

function buildScene() {
  track = TrackSystem.build();

  const carBuilt = CarModel.build();
  car = { group: carBuilt.group, wheels: carBuilt.wheelObjects };
  scene.add(car.group);

  // Place car at circuit start
  const startPos = track.curve.getPointAt(0);
  car.group.position.set(startPos.x, 0.01, startPos.z);

  // Orient car along track direction
  const startTangent = track.curve.getTangentAt(0);
  car.group.rotation.y = Math.atan2(-startTangent.x, -startTangent.z);
  PhysicsController.state.heading = car.group.rotation.y;

  // Minimap init
  Minimap.init(track.curve);

  // Chase cam initial position
  mainCamera.position.set(startPos.x, 30, startPos.z + 40);
  mainCamera.lookAt(startPos);
}

function resetCar() {
  const startPos = track.curve.getPointAt(0);
  car.group.position.set(startPos.x, 0.01, startPos.z);
  const t = track.curve.getTangentAt(0);
  car.group.rotation.y = Math.atan2(-t.x, -t.z);
  PhysicsController.state.velocity = 0;
  PhysicsController.state.heading  = car.group.rotation.y;
}

buildScene();

// ================================================================
//  GAME LOOP
// ================================================================
let lastTime = performance.now();

// Closest-point-on-curve estimator (for lap tracking)
// Uses a coarse scan then refines — runs once per frame, cheap
function estimateCurveT(position, curve) {
  const COARSE = 100;
  let best = 0, bestDist = Infinity;
  for (let i = 0; i < COARSE; i++) {
    const t  = i / COARSE;
    const p  = curve.getPointAt(t);
    const d  = position.distanceToSquared(p);
    if (d < bestDist) { bestDist = d; best = t; }
  }
  return best;
}

function animate() {
  requestAnimationFrame(animate);

  const now = performance.now();
  const dt  = Math.min((now - lastTime) / 1000, 0.05);
  lastTime  = now;

  // ---- Physics ----
  const pState = PhysicsController.update(InputHandler.keys, dt);

  // ---- Move car ----
  car.group.rotation.y = pState.heading;
  car.group.position.x -= Math.sin(pState.heading) * pState.velocity * dt;
  car.group.position.z -= Math.cos(pState.heading) * pState.velocity * dt;

  // ---- Wheel animation ----
  animateWheels(car.wheels, pState.velocity, dt);

  // ---- Lap timing ----
  const curveT = estimateCurveT(car.group.position, track.curve);
  LapTimer.update(pState, curveT, dt);

  // ---- Camera ----
  CameraSystem.update(car.group, pState.velocity, dt);

  // ---- HUD ----
  HUDSystem.update(pState);

  // ---- Minimap ----
  Minimap.update(car.group.position.x, car.group.position.z);

  // ---- Render ----
  renderer.render(scene, mainCamera);
}

// ================================================================
//  DISMISS LOADING SCREEN
// ================================================================
window.addEventListener('load', () => {
  setTimeout(() => {
    const loading = document.getElementById('loading');
    loading.style.opacity = '0';
    setTimeout(() => loading.remove(), 900);
  }, 1400);
});

animate();
</script>
